<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Sec 3 G3 Geography: Refactored Volcano Structure VR</title>
    <meta name="description" content="Optimized High-Contrast Layout for G3 Learners">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-entity environment="preset: starry; groundColor: #1a1a1a; grid: cross; gridColor: #444; playArea: 1"></a-entity>

      <a-entity id="rig" position="0 1.2 3.8">
        <a-camera look-controls wasd-controls>
          <a-cursor color="#FFF"></a-cursor>
        </a-camera>
      </a-entity>

      <a-plane position="0 0.01 -3" rotation="-90 0 0" width="10" height="10" color="#2b1d11" opacity="0.9"></a-plane>

      <a-cone position="0 1.5 -3" radius-bottom="4" radius-top="0.5" height="3" color="#333333" opacity="1" open-ended="false">
        <a-torus position="0 1.5 0" rotation="90 0 0" radius="0.4" radius-tubular="0.05" color="#222222"></a-torus>
      </a-cone>

      <a-sphere position="0 -0.8 -3" radius="1.1" color="#FFCC00" material="emissive: #FF9900; emissiveIntensity: 0.6"></a-sphere>
      
      <a-cylinder position="0 1.2 -3" radius="0.2" height="2.4" color="#FFCC00" material="emissive: #FF9900; emissiveIntensity: 0.6"></a-cylinder>

      <a-box position="0.8 2.3 -2.6" rotation="25 0 35" width="1.8" height="0.08" depth="0.4" color="#CC3300" material="emissive: #990000"></a-box>


      <a-plane position="-2.3 -0.5 -2.5" width="2" height="0.7" color="#000000" opacity="0.8">
        <a-text value="1. MAGMA CHAMBER\nStore of molten rock\nunderground." align="center" position="0 0 0.05" scale="0.45 0.45 0.45" color="#FFF"></a-text>
      </a-plane>
      
      <a-plane position="2.2 1.2 -2.5" width="2" height="0.7" color="#000000" opacity="0.8">
        <a-text value="2. CONDUIT\nMain pipe where\nmagma travels up." align="center" position="0 0 0.05" scale="0.45 0.45 0.45" color="#FFF"></a-text>
      </a-plane>

      <a-plane position="0 3.5 -3" width="2" height="0.7" color="#000000" opacity="0.8">
        <a-text value="3. CRATER\nBowl-shaped opening\nat the top." align="center" position="0 0 0.05" scale="0.45 0.45 0.45" color="#FFFF00"></a-text>
      </a-plane>

      <a-plane position="2.5 2.3 -2.2" width="2" height="0.7" color="#000000" opacity="0.8">
        <a-text value="4. LAVA FLOW\nMagma that reaches\nthe Earth's surface." align="center" position="0 0 0.05" scale="0.45 0.45 0.45" color="#FFF"></a-text>
      </a-plane>


      <a-entity position="-3.5 1.6 -1.5" rotation="0 55 0">
        <a-plane width="2.8" height="2.2" color="#111111" opacity="0.95" border="color: #FFCC00; width: 2"></a-plane>
        <a-text value="TECTONIC FORMATION" position="0 0.8 0.05" align="center" width="2.6" color="#FFCC00"></a-text>
        <a-text value="1. PLATES COLLIDE\nOceanic plate sinks under\nContinental plate.\n\n2. MELTING\nExtreme heat melts rock\ninto hot magma.\n\n3. MAGMA RISES\nMagma is lighter (less dense)\nthan solid rock, so it\nforces its way up." 
                position="-1.2 -0.1 0.05" width="2.4" color="#FFFFFF" wrap-count="28"></a-text>
      </a-entity>

      <a-entity light="type: ambient; intensity: 0.5"></a-entity>
      <a-entity light="type: directional; intensity: 0.7" position="2 4 2"></a-entity>

    </a-scene>
  </body>
</html>
